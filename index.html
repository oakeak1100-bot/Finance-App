<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxk7GR2Xm5Jla-VXUFn3GNg8f0_mAlM_v4I1zTL8xx8avZYrHkvzwialIt0jQ2ag9wPgw/exec";

    // --- UPDATED LOAD LOGIC ---
    async function loadSpreadsheetData() {
        const tableBody = document.getElementById('data-table-body');
        try {
            // Fetch the spreadsheet data as an unblocked text stream
            const response = await fetch(`${WEB_APP_URL}?action=read`);
            const textData = await response.text();
            
            // Convert the raw text stream back into a structural JSON object locally
            const result = JSON.parse(textData);
            
            if (result.status === "success" && result.data.length > 0) {
                tableBody.innerHTML = ""; 
                result.data.reverse().forEach(row => {
                    appendTableRow(row.timestamp, row.item, row.amount, false);
                });
            } else {
                tableBody.innerHTML = `<tr><td colspan="3" class="loading-text">No data entries found in sheet.</td></tr>`;
            }
        } catch (error) {
            tableBody.innerHTML = `<tr><td colspan="3" class="loading-text" style="color: #e74c3c;">Failed to load data from sheet.</td></tr>`;
            console.error("Read Error:", error);
        }
    }

    function appendTableRow(timestamp, item, amount, isPending = false) {
        const tableBody = document.getElementById('data-table-body');
        const emptyRow = tableBody.querySelector('.loading-text');
        if (emptyRow) tableBody.innerHTML = "";

        const tr = document.createElement('tr');
        if (isPending) tr.className = "pending-sync";
        
        tr.innerHTML = `
            <td>${timestamp}</td>
            <td>${item}</td>
            <td>$${Number(amount).toFixed(2)}</td>
        `;
        
        tableBody.insertBefore(tr, tableBody.firstChild);
        return tr;
    }

    document.getElementById('finance-form').addEventListener('submit', async function(e) {
        e.preventDefault(); 
        
        const itemInput = document.getElementById('item');
        const amountInput = document.getElementById('amount');
        const submitBtn = document.getElementById('submit-btn');
        const statusMsg = document.getElementById('status-message');

        const tempItem = itemInput.value;
        const tempAmount = parseFloat(amountInput.value);
        const tempTimestamp = new Date().toLocaleString();

        const pendingRowElement = appendTableRow(tempTimestamp, tempItem, tempAmount, true);

        itemInput.value = "";
        amountInput.value = "";
        statusMsg.className = "success";
        statusMsg.innerText = "Logged instantly (syncing to cloud...)";

        const payload = { item: tempItem, amount: tempAmount };

        try {
            await fetch(WEB_APP_URL, {
                method: 'POST',
                mode: 'no-cors', 
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            pendingRowElement.className = "";
            statusMsg.innerText = "Cloud sync completed successfully.";

        } catch (error) {
            statusMsg.className = "error";
            statusMsg.innerText = "Cloud sync failed. Row remains local.";
            pendingRowElement.style.color = "#e74c3c"; 
            console.error(error);
        }
    });

    window.addEventListener('DOMContentLoaded', loadSpreadsheetData);
</script>
